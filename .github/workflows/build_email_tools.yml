name: Build & Release — Email Tools

on:
  push:
    tags:
      - 'email-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. email-v1.0.2)'
        required: true
        default: 'email-v1.0.2'

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller customtkinter pyspellchecker pillow cryptography

      - name: Build BulkEmailSender.exe
        run: |
          cd letustech-email-tools
          pyinstaller --onefile --windowed --name "BulkEmailSender" BulkEmailSender.py
        shell: powershell

      - name: Build EmailCSVMaker.exe
        run: |
          cd letustech-email-tools
          pyinstaller --onefile --windowed --name "EmailCSVMaker" email_csv_maker.py
        shell: powershell

      - name: Get version
        id: get_version
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            echo "VERSION=${{ github.ref_name }}" >> $env:GITHUB_OUTPUT
          } else {
            echo "VERSION=${{ github.event.inputs.version }}" >> $env:GITHUB_OUTPUT
          }
        shell: powershell

      - name: Release — Bulk Email Sender
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          name: "Bulk Email Sender ${{ steps.get_version.outputs.VERSION }}"
          body: |
            ## Bulk Email Sender ${{ steps.get_version.outputs.VERSION }}

            Send personalised bulk emails via your own Gmail or email account.

            ### 📦 Download
            Download **BulkEmailSender.exe** below and run it — no installation needed.

            ### Features
            - Send to unlimited contacts via Gmail, Outlook or any SMTP provider
            - Merge tags — personalise every email with `{{first_name}}`, `{{company}}` etc.
            - 18 pre-built templates
            - Tag Inspector — preview each contact's email before sending
            - Rich text editor with spell checker
            - 6 UI themes
            - Encrypted credential storage

            ### Requirements
            - Windows 10 or 11
            - No Python needed — fully bundled

            > For Gmail use an [App Password](https://myaccount.google.com/apppasswords) not your normal password.

            ---
            *Works best alongside [Email CSV Maker](https://github.com/letustec-oss/LetUsTech/releases) — build your contact list and launch straight into this tool.*
          files: letustech-email-tools/dist/BulkEmailSender.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release — Email CSV Maker
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION }}-csvmaker
          name: "Email CSV Maker ${{ steps.get_version.outputs.VERSION }}"
          body: |
            ## Email CSV Maker ${{ steps.get_version.outputs.VERSION }}

            Build and manage your email contact lists with custom merge tag fields.

            ### 📦 Download
            Download **EmailCSVMaker.exe** below and run it — no installation needed.

            ### Features
            - Add contacts manually or paste in bulk
            - Custom fields — phone, company, or any field you need
            - Tag reference panel — see exactly which `{{tags}}` match your columns
            - Email validation — invalid addresses highlighted in red
            - Import / export CSV
            - One-click launch into Bulk Email Sender with contacts pre-loaded

            ### Requirements
            - Windows 10 or 11
            - No Python needed — fully bundled

            ---
            *Works best alongside [Bulk Email Sender](https://github.com/letustec-oss/LetUsTech/releases) — build your list here then launch straight into sending.*
          files: letustech-email-tools/dist/EmailCSVMaker.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
