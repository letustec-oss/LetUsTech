name: Build & Release

# Triggers: runs when you push a version tag like v1.0.0
on:
  push:
    tags:
      - 'v*'
  # Also lets you trigger manually from GitHub Actions tab
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      # 1. Check out your code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          pip install pyinstaller customtkinter pyspellchecker pillow cryptography

      # 4. Build Bulk Email Sender
      - name: Build BulkEmailSender.exe
        run: |
          pyinstaller `
            --onefile `
            --windowed `
            --name "BulkEmailSender" `
            --icon "assets/icon.ico" `
            BulkEmailSender.py
        continue-on-error: false

      # 5. Build Email CSV Maker
      - name: Build EmailCSVMaker.exe
        run: |
          pyinstaller `
            --onefile `
            --windowed `
            --name "EmailCSVMaker" `
            --icon "assets/icon.ico" `
            email_csv_maker.py
        continue-on-error: false

      # 6. Create a zip with both EXEs + README
      - name: Package release files
        run: |
          mkdir LetUsTech_Email_Tools
          copy dist\BulkEmailSender.exe LetUsTech_Email_Tools\
          copy dist\EmailCSVMaker.exe LetUsTech_Email_Tools\
          copy README.md LetUsTech_Email_Tools\
          Compress-Archive -Path LetUsTech_Email_Tools\* -DestinationPath LetUsTech_Email_Tools_Windows.zip
        shell: powershell

      # 7. Create GitHub Release and upload the zip
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "LetUsTech Email Tools ${{ github.ref_name }}"
          body: |
            ## LetUsTech Email Tools ${{ github.ref_name }}

            ### 📦 Download
            Download **LetUsTech_Email_Tools_Windows.zip** below, extract it, and run either `.exe` — no installation needed.

            ### What's included
            | File | Description |
            |------|-------------|
            | `BulkEmailSender.exe` | Main bulk email sending tool |
            | `EmailCSVMaker.exe` | Contact list builder |

            ### Requirements
            - Windows 10 or 11
            - No Python needed — fully bundled

            ### Quick Start
            1. Open `BulkEmailSender.exe`
            2. Click **⚙ Settings → 📧 SMTP** and enter your email + App Password
            3. Import a CSV or use the CSV Maker to build your contact list
            4. Write your email, use `{{first_name}}` tags, and send

            > For Gmail you need an [App Password](https://myaccount.google.com/apppasswords) — not your normal password.
          files: LetUsTech_Email_Tools_Windows.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
